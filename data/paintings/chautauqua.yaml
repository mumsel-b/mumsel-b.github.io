paintings:
  - title: "All Aboard!"
    thumb: "all_aboard.jpg"
    full: "all_aboard.jpg"
    medium: "Oil on Canvas"
    dimensions: '24" X 36"'
    collection: "Chautauqua Park was situated six miles from the city of Devils lake. At the turn of the 20th century local businessmen established a commuter railway called the “Air Line” because of the open-air coaches. The train made numerous round trips daily for 25 cents per trip. Established in 1903, the “airline” transported thousands of eager Chautauquans to Chautauqua Park. How they loved to hear the conductor exclaim, “Alllllllllllll Aboard!”"
  - title: "Gathering at the Chautauqua Gate"
    thumb: "gathering_chautauqua_gate.jpg"
    full: "thumbs/gathering_chautauqua_gate.jpg"
    medium: "Oil on Canvas"
    dimensions: '24" X 30"'
    collection: "Early Bonds of Friendship. Traditions of learning and friendship had their beginnings at early Chautauqua celebrations. Pioneer families lived in tents and Indian families in tepees. They came together for meaningful cultural exchange. Pictured here: An exchange of greetings at the Chautauqua gate."
  - title: "Sunday Afternoon by the Chautauqua Grand"
    thumb: "sunday_afternoon_chautauqua_grand.jpg"
    full: "thumbs/sunday_afternoon_chautauqua_grand.jpg"
    medium: "Oil on Canvas"
    dimensions: '24" X 30"'
    collection: 'A 1908 Chautauqua Program states, "The auditorium on the Chautauqua grounds is the pride of every North Dakotan. It is one of the largest buildings of the kind in the state and has a seating capacity sufficient to contain the largest crowds." The auditorium had a seating capacity of 4 thousand. The proscenium arch was 46 feet with a possibility of expanding to 90 feet, and the cupola was 58 feet from the floor. Pictured here: Chautauquas gather on the lawn of the Grand Auditorium waiting for Russell Conwell to present his famed "Acres of Diamonds" speech.'
  - title: "W.C.T.U."
    thumb: "wctu.jpg"
    full: "wctu.jpg"
    medium: "Oil on Canvas"
    dimensions: '24" X 36"'
    collection: "Lively Women's Christian Temperance Union meetings were held at North Dakota Chautauqua. Famed women's temperance advocate Carrie Nation spoke to an enthusiastic crowd in 1903. She waved a hatchet, threatening to demolish every whiskey keg within her reach. This painting is reminiscent of her appearance at the Chautauqua Grand Auditorium."
  - title: "Our Natal Day"
    thumb: "our_natal_day.jpg"
    full: "all_aboard.jpg"
    medium: "Oil on Canvas"
    dimensions: '24" X 36"'
    collection: "A 1907 Chautauqua Program states, \"It has always been the policy of Chautauqua to make the nation's birthday one of patriotism and enthusiasm.\" Pictured here: A Fourth of July celebration, where patriotism and merriment were happily mingled, and political speeches were the order of the day."
  - title: "Oakwood Hotel"
    thumb: "oakwood_hotel.jpg"
    full: "all_aboard.jpg"
    medium: "Oil on Canvas"
    dimensions: '15" X 19"'
    collection: "The Oakwood Hotel provided lodging for travelers from afar. In 1889, Devils Lake Illustrated stated, \"Nothing has been left undone to make the sojourn of the Chautauquan a 'joy forever'. The Oakwood Hotel, a large three-story structure, cozily and attractively fitted up throughout, provides for the guests who do not care to try camp life.\""
  - title: "A Stroll by Enchanted Waters"
    thumb: "a_stroll_by_enchanted_waters.jpg"
    full: "a_stroll_by_enchanted_waters.jpg"
    medium: "Oil on Canvas"
    dimensions: '12" X 15"'
    collection: 'Chautauquans enjoyed life in the open air. The lakeshore provided much opportunity for enjoyment. Devils Lake Illustrated in 1889 stated, "On the north shore of Devils Lake, charmingly situated on beautiful wooded bluffs overlooking the pretty are of the lake known as Creel Bay, are the North Dakota Chautauqua grounds, the finest site and the most picturesque, naturally, of all the numerous Chautauqua grounds in the United States.: Pictured here: Chautauquans enjoy the summer breezes beside the great lake they endearingly called The Enchanted Waters.'
  - title: "Century of the Child"
    thumb: "century_of_the_child.jpg"
    full: "all_aboard.jpg"
    medium: "Oil on Canvas"
    dimensions: '24" X 30"'
    collection: "A 1910 Chautauqua Program states, \"This is the Century of the Child. That is what great philosophers and students are telling us, and nothing marks the fact better than the establishment of the kindergarten system of education. Kindergarten is what the name implies - 'child gardening.' It is training of the young mind as the plants and flowers are grown- the bringing good soil, the giving proper food, but above all, the showering down of God's sunshine. The little child learns to love his play school where he plays for a purpose. He delights in the games which are taught him that he may absorb from them some needed elemental idea.\" Pictured here: Kindergarten children enjoying a game on the lawn by the Grand Auditorium."
  - title: "Daydreams"
    thumb: "daydreams.jpg"
    full: "all_aboard.jpg"
    medium: "Oil on Canvas"
    dimensions: '24" X 30"'
    collection: 'Many Romances blossomed at Chautauqua celebrations o the shores of Devils Lake. It was Sangria, a place to build sand castles and to enjoy wistful daydreams. Describing the setting, on June 16, 1900, an article in the Churchs Ferry Sun stated, "At times, this magnificent old lake is majestic in its way, and the waves come rolling in triumphant song as though celebrating some great victory; and then again, the surface is as smooth and placid as can be, and not a ripple can be heard. He that has experienced the beautiful skies of a night in North Dakota can realize the beauties of this spot on a summer afternoon or evening."'
  - title: "A Place to Ponder"
    thumb: "a_place_to_ponder.jpg"
    full: "all_aboard.jpg"
    medium: "Oil on Canvas"
    dimensions: '24" X 30"'
    collection: 'The steamboat "Minnie H" plied the waters of Devils Lake from July 4th, 1883, until autumn 1909. It carried passengers, freight, and mail between Devils Lake, Minnewaukan, Fort Totten, and other points of interest on the lake. The steamboat was built and commanded by Captain E.E. Heerman and carried as many as 3,000 passengers during the peek of its season, the two-week Chautauqua celebration each summer. Sometimes the passenger load would be as many as 500 for the 30-mile trip around the lake. Pictured here: The steamboat Minnie H passes by as Chautauquans watch from shore.'
  - title: "Home Once Again"
    thumb: "home_once_again.jpg"
    full: "home_once_again.jpg"
    medium: "Oil on Canvas"
    dimensions: '24" X 30"'
    collection: "Pictured here: A pioneer mother enjoys Chautauqua souvenirs with her family. A 1898 issue of the Churchs Ferry Sun states, \"A farmer who came with his family and spent a week at the Chautauqua during the past season says, 'It has been a wonderful help to my wife and and myself. Both of us feel refreshed and encouraged and will return to our home with renewed interest, animation, and determination. The children, too, got new ideas and new desires to know, to do, to appreciate. It has paid us ten times over.'\""
