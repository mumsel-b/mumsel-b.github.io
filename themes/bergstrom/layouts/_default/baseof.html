<!DOCTYPE html>
<html lang="{{ .Site.Language.Locale }}">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  {{ partial "header.html" . }}
  <main class="site-main">
    {{- block "main" . }}{{- end }}
  </main>
  {{ partial "footer.html" . }}
  <div id="lightbox" class="lightbox" role="dialog" aria-modal="true" aria-label="Painting viewer">
    <button class="lightbox-close" aria-label="Close">&times;</button>
    <button class="lightbox-prev" aria-label="Previous painting">&#8592;</button>
    <button class="lightbox-next" aria-label="Next painting">&#8594;</button>
    <div class="lightbox-content">
      <img id="lightbox-img" src="" alt="">
      <div class="lightbox-caption">
        <h3 id="lightbox-title"></h3>
        <p id="lightbox-meta"></p>
        <p id="lightbox-collection"></p>
      </div>
    </div>
  </div>
  <script src="/js/gallery.js"></script>
</body>
</html>
